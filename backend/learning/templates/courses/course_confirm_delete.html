<!DOCTYPE html>
<html>
<body>
    <h1>Удалить курс?</h1>
    <p>Вы уверены что хотите удалить курс "{{ course.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Да, удалить</button>
        <a href="{{ course.get_absolute_url }}">Отмена</a>
    </form>
</body>
</html>
