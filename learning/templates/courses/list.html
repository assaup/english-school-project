<!DOCTYPE html>
<html>
<body>
    <h1>Курсы уровня A1</h1>
    <form method="get">
        <input type="text" name="q" value="{{ query }}" placeholder="Поиск курса...">
        <button type="submit">Найти</button>
    </form>

    {% for course in courses %}
        <p>
            <a href="{{ course.get_absolute_url }}">{{ course.title }}</a>
            — {{ course.level }}
        </p>
    {% empty %}
        <p>Курсов не найдено</p>
    {% endfor %}
</body>
</html>
